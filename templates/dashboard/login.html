<!DOCTYPE html>
<html>

<head>

    <title>
        Broker Login
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow mt-5">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">

                        Broker Login

                    </h2>

                    
                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>

                                Username

                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>

                                Password

                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Login

                        </button>
                        

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
