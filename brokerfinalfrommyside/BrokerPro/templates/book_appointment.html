{% extends 'base.html' %}

{% block title %}
Book Appointment
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="mb-4 text-center">

                        Book Property Visit

                    </h2>

                    <hr>

                    <!-- PROPERTY DETAILS -->

                    <div class="mb-4">

                        <h4>

                            {{ property.title }}

                        </h4>

                        <p class="text-muted">

                            📍 {{ property.location }}

                        </p>

                        <h5 class="text-success">

                            ₹ {{ property.price }}

                        </h5>

                    </div>

                    
                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input type="text"
                                       name="customer_name"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Appointment Date

                                </label>

                                <input type="date"
                                       name="appointment_date"
                                       class="form-control"
                                       required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Appointment Time

                            </label>

                            <input type="time"
                                   name="appointment_time"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Message

                            </label>

                            <textarea name="message"
                                      rows="4"
                                      class="form-control"
                                      placeholder="Any special requirements or questions?"></textarea>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Submit Appointment Request

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
