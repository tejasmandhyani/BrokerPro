<!DOCTYPE html>
<html>
<head>
    <title>Property API Demo</title>
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Properties From API
    </h1>

    <div class="row"
         id="property-container">

    </div>

</div>

<script>

fetch('/api/properties/')

.then(response => response.json())

.then(data => {

    let container =
        document.getElementById(
            'property-container'
        );

    data.forEach(property => {

        container.innerHTML += `

<div class="col-md-4 mb-4">

<div class="card shadow">

<div class="card-body">

<h5>
${property.title}
</h5>

<p>
📍 ${property.city}
</p>

<p>
₹ ${property.price}
</p>

</div>

</div>

</div>

`;

    });

});

</script>

</body>
</html>
