{% extends 'dashboard/base_dashboard.html' %}

{% block title %}
Add Property
{% endblock %}

{% block content %}


<div class="container-fluid">

    <div class="d-flex justify-content-between mb-4">

        <h2>Add Property</h2>

        <a href="{% url 'property_list' %}"
           class="btn btn-secondary">

            Back

        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="mb-3">

                    <label class="form-label">

                        Property Images

                    </label>

                    <input type="file"
                           name="images"
                           multiple
                           class="form-control">

                </div>
                <div class="mb-3">

                <label class="form-label fw-bold">

                  Property Videos

                </label>

                <input
                type="file"
                name="videos"
                class="form-control"
                multiple
                accept="video/*">

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Save Property

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
